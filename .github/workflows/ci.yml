name: CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # Repo kodunu götürür
      - uses: actions/checkout@v3

      # Node qurur
      - uses: actions/setup-node@v3
        with:
          node-version: 20

      # Dependency install
      - name: Install dependencies
        run: npm install

      # Sadə inline test (CI hissə)
      - name: Run simple test
        run: node -e "console.log('Test running...'); if (1 + 1 !== 2) process.exit(1)"

      # Build
      - name: Build project
        run: npm run build

  cd:
    runs-on: ubuntu-latest
    needs: ci   # CI keçməsə CD işləmir

    steps:
      - uses: actions/checkout@v3

      # Vercel CLI install
      - name: Install Vercel CLI
        run: npm install -g vercel

      # Deploy
      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
